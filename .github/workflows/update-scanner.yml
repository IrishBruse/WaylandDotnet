name: Update scanner output

on:
  schedule:
    # Weekly on Friday at 18:00 UTC
    - cron: "0 18 * * 5"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-scanner
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download protocol XML
        working-directory: WaylandDotnet.Scanner
        run: dotnet run --configuration Release -- download

      - name: Generate bindings and docs
        working-directory: WaylandDotnet.Scanner
        run: dotnet run --configuration Release

      - name: Build and test
        run: |
          dotnet build --configuration Release
          dotnet test --configuration Release --no-build

      - name: Summarize protocol changes
        id: summary
        env:
          PR_BODY_PATH: ${{ runner.temp }}/pr-body.md
        run: python3 .github/scripts/summarize-protocol-changes.py >> "$GITHUB_OUTPUT"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automated/scanner-update
          delete-branch: true
          commit-message: ${{ steps.summary.outputs.commit_message }}
          title: ${{ steps.summary.outputs.title }}
          body-path: ${{ runner.temp }}/pr-body.md
          labels: |
            automated
            protocols
