name: Nuget Release

run-name: Release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.6.0 or v0.6.0)"
        required: true
        default: "0.0.0"
env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  build:
    strategy:
      matrix:
        project:
          - "WaylandDotnet/WaylandDotnet.csproj"
          - "WaylandDotnet.Scanner/WaylandDotnet.Scanner.csproj"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Normalize version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          echo "semver=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore "${{github.workspace}}/${{matrix.project}}"

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output ${{github.workspace}}/Nuget --no-restore --include-source "${{github.workspace}}/${{matrix.project}}" /p:version=${{ steps.version.outputs.semver }}

      - name: Publish to Nuget
        run: dotnet nuget push --source https://api.nuget.org/v3/index.json --api-key ${{secrets.NUGET_API_KEY}} ${{github.workspace}}/Nuget/*.nupkg --skip-duplicate

  release:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Normalize version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          echo "semver=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: ${{ ! endsWith(steps.version.outputs.semver, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
              --repo="$GITHUB_REPOSITORY" \
              --title="${{ steps.version.outputs.tag }}" \
              --notes="https://ethanconneely.com/WaylandDotnet/#/Changelog" \
              --generate-notes
